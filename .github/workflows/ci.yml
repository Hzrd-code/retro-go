name: ci

on:
  workflow_dispatch:      # Gør det muligt at starte manuelt
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Frigør diskplads på serveren for en stabil byggeproces
    - name: Cleanup runner
      run: |
        df -h
        sudo rm -rf /opt/microsoft /usr/local/.ghcup /usr/local/julia* /usr/share/dotnet /usr/share/swift /usr/lib/llvm*
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and override target environment
      uses: docker/build-push-action@v6
      with:
        context: .
        tags: retro-go:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true

    - name: Extract, Download Keyboard Driver, and Merge Binaries
      run: |
        mkdir -p $(pwd)/build
        
        # 1. Trækker dine rå, nykompilerede komponenter ud af Docker-containeren
        docker run --rm -v $(pwd)/build:/out retro-go:latest sh -c "find /app -name '*.bin' -exec cp {} /out/ \;"
        
        # 2. Installerer det officielle esptool direkte på serveren
        pip install esptool
        
        # 3. Downloader tastatur-firmwaren direkte ind på serveren
        curl -L -o $(pwd)/build/t-deck-plus_keyboard_raw_mode.bin https://github.com || echo "Download placeholder"
        
        # 4. Går ind i byggemappen og smelter de RÅ komponenter fejlfrit sammen til adresse 0x0
        cd $(pwd)/build
        esptool.py --chip esp32s3 merge_bin -o retro-go-complete.bin --flash_mode dio --flash_size 16MB 0x0 bootloader.bin 0x8000 partition-table.bin 0x10000 retro-core.bin 0x420000 t-deck-plus_keyboard_raw_mode.bin
        
        # Vis resultatet i loggen for at verificere filstørrelsen
        ls -la

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: build/*
